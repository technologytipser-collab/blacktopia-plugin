name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: mvn package
      - uses: actions/upload-artifact@v3
        with:
          name: BlocktopiaAuth
          path: target/BlocktopiaAuth.jar
