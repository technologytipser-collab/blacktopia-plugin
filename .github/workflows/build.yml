name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: mvn package -DskipTests

      - uses: actions/upload-artifact@v4

        with:
          name: BlocktopiaAuth
          path: target/BlocktopiaAuth.jar
